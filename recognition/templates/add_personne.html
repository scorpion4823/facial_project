<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une personne</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.3);
        }

        .form-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            padding: 40px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.4);
            border-color: #ffc107;
        }

        .btn-custom {
            background-color: #ffc107;
            border: none;
            color: black;
            font-weight: 600;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #ffca2c;
            transform: translateY(-2px);
        }

        .preview-img {
            width: 100%;
            margin-top: 15px;
            border-radius: 15px;
            display: none;
        }

        .footer {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Face Recognition</a>
        <div>
            <a href="{% url 'recognize' %}" class="btn btn-light btn-sm">
                Reconnaître
            </a>
        </div>
    </div>
</nav>

<!-- FORM SECTION -->
<!-- FORM SECTION -->
<div class="form-container">
    <div class="card bg-white">

        <h3 class="text-center mb-4 fw-bold">Ajouter une personne</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <table class="table table-borderless align-middle">
                <tbody>

                    <tr>
                        <th style="width: 30%;">Nom</th>
                        <td>{{ form.nom }}</td>
                    </tr>

                    <tr>
                        <th>Prénom</th>
                        <td>{{ form.prenom }}</td>
                    </tr>

                    <tr>
                        <th>Âge</th>
                        <td>{{ form.age }}</td>
                    </tr>

                    <tr>
                        <th>Adresse</th>
                        <td>{{ form.adresse }}</td>
                    </tr>

                    <tr>
                        <th>Photo</th>
                        <td>{{ form.image }}</td>
                    </tr>

                </tbody>
            </table>

            <img id="preview" class="preview-img"/>

            <div class="d-grid mt-3">
                <button type="submit" class="btn btn-custom">
                    Enregistrer
                </button>
            </div>

        </form>

    </div>
</div>
<!-- FOOTER -->
<div class="footer">
    © 2026 Face Recognition System
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Preview JS -->
<script>
    const imageInput = document.querySelector('input[type="file"]');
    const preview = document.getElementById('preview');

    imageInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = "block";
            }
            reader.readAsDataURL(file);
        }
    });
</script>

</body>
</html>
